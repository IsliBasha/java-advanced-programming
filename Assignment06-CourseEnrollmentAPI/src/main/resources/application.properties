# =====================================================
# Assignment 06 – Course Enrolment Management API
# =====================================================

spring.application.name=course-enrollment-api
server.port=8086

# ── MySQL Data Source ─────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/course_enrollment_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Seed Data ─────────────────────────────────────
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# ── Jackson ───────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
