# Assignment 09 – Digital Media Catalogue API
# =====================================================

spring.application.name=digital-media-catalogue-api
server.port=8089

spring.datasource.url=jdbc:mysql://localhost:3306/digital_media_catalogue_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

spring.jackson.serialization.write-dates-as-timestamps=false
